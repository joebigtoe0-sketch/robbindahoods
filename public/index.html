<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Robbin da Hood</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#4c4a44;font-family:'Pixelify Sans',system-ui,sans-serif;user-select:none}
a{color:#8ae05c}a:hover{color:#b0f08a}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
@keyframes rh-in{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes rh-pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes rh-flash{0%,100%{opacity:0}50%{opacity:1}}
#game{position:absolute;inset:0;display:block;cursor:pointer}
.hidden{display:none !important}

/* ---- shared bits ---- */
.chip{display:flex;align-items:center;gap:8px;background:rgba(20,18,24,.9);backdrop-filter:blur(8px);border:1px solid rgba(243,231,205,.14);border-radius:10px;padding:6px 12px 6px 8px;box-shadow:0 6px 16px rgba(0,0,0,.35)}
.btn{border:1px solid rgba(23,16,10,.55);border-radius:12px;padding:8px 14px;font-weight:700;font-size:15px;box-shadow:0 4px 10px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.28)}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(1px)}
.btn-green{background:linear-gradient(180deg,#8bcf5e,#6cb03f);color:#14260c}
.btn-gold{background:linear-gradient(180deg,#f8c65c,#eda72e);color:#241605}
.btn-purple{background:linear-gradient(180deg,#c8a2f0,#a276d4);color:#241633}
.btn-pink{background:linear-gradient(180deg,#f28aa6,#e05c80);color:#33101c}
.btn-dim{background:rgba(243,231,205,.1);color:#f3e7cd}
.btn-sm{border-radius:8px;padding:5px 12px;font-size:13px;box-shadow:0 3px 8px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.22)}
.card{background:rgba(23,16,10,.5);border:1px solid rgba(243,231,205,.08);border-radius:10px;padding:11px 14px}
.muted{color:#c9b896}.dim{color:#8f7f63}

/* ---- panel ---- */
#panel{position:absolute;top:0;right:0;bottom:0;width:430px;max-width:94vw;background:rgba(24,22,30,.95);backdrop-filter:blur(14px);border-left:1px solid rgba(138,224,92,.25);color:#f3e7cd;display:flex;flex-direction:column;z-index:30;animation:rh-in .18s ease-out;box-shadow:-12px 0 40px rgba(0,0,0,.45)}
#panel .p-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid rgba(243,231,205,.12)}
#panel .p-title{font-size:22px;font-weight:700}
#panel .p-body{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:12px}
#panel input{background:rgba(23,16,10,.6);border:1px solid rgba(243,231,205,.2);border-radius:8px;color:#f3e7cd;padding:8px 10px;font-size:14px;outline:none;width:100%;box-sizing:border-box}
#panel input:focus{border-color:rgba(138,224,92,.5)}

/* ---- modal ---- */
#modal{position:absolute;inset:0;background:rgba(10,8,14,.6);z-index:50;display:flex;align-items:center;justify-content:center}
#toast{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);z-index:60;background:rgba(16,14,20,.93);backdrop-filter:blur(6px);color:#f3e7cd;border:1px solid rgba(243,231,205,.15);border-radius:10px;padding:8px 16px;font-size:14px;font-weight:600;box-shadow:0 6px 16px rgba(0,0,0,.35);animation:rh-in .15s ease-out;pointer-events:none}

/* ---- auth ---- */
#auth{position:absolute;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:linear-gradient(rgba(12,10,14,.45),rgba(12,10,14,.62)),#1c1a18 url('./bg.png') center/cover no-repeat;background-blend-mode:normal}
#auth .box{backdrop-filter:blur(3px)}
#auth .box{width:460px;max-width:92vw;background:rgba(26,24,32,.97);border:1px solid rgba(138,224,92,.3);border-radius:14px;color:#f3e7cd;box-shadow:0 20px 50px rgba(0,0,0,.55);animation:rh-pop .2s ease-out;overflow:hidden}
#auth .banner{display:block;width:100%;height:auto;border-bottom:4px solid #17100a}
#auth .body{padding:18px;display:flex;flex-direction:column;gap:10px}
#auth input{background:rgba(23,16,10,.6);border:1px solid rgba(243,231,205,.2);border-radius:8px;color:#f3e7cd;padding:10px 12px;font-size:15px;outline:none}
#auth input:focus{border-color:rgba(138,224,92,.5)}
#auth .err{color:#ff9a8a;font-size:13px;min-height:16px}

/* ---- chat ---- */
#chat{position:absolute;left:14px;bottom:64px;z-index:20;width:280px;display:flex;flex-direction:column;gap:6px}
#chat-log{display:flex;flex-direction:column;gap:2px;font-size:12.5px;line-height:1.35;color:#f3e7cd;text-shadow:0 1px 2px rgba(0,0,0,.85);max-height:160px;overflow:hidden;pointer-events:none;word-break:break-word}
#chat-log .cm{background:rgba(16,14,20,.55);border-radius:6px;padding:2px 8px;align-self:flex-start}
#chat-input{background:rgba(20,18,24,.85);border:1px solid rgba(243,231,205,.18);border-radius:8px;color:#f3e7cd;padding:6px 10px;font-size:13px;outline:none;width:100%;box-sizing:border-box}
#chat-input:focus{border-color:rgba(138,224,92,.5);background:rgba(20,18,24,.95)}
</style>
</head>
<body>

<canvas id="game"></canvas>

<!-- HUD top-left: resources -->
<div id="hud" class="hidden">
  <div style="position:absolute;top:14px;left:14px;display:flex;flex-direction:column;gap:8px;z-index:20">
    <div class="chip">
      <svg width="17" height="17" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5.6" fill="#f2b23a" stroke="#17100a" stroke-width="1.8"></circle><circle cx="7" cy="7" r="2.6" fill="none" stroke="#b57f1d" stroke-width="1.4"></circle></svg>
      <span id="h-gold" style="color:#f2b23a;font-weight:700;font-size:18px">0</span>
      <svg width="16" height="16" viewBox="0 0 14 14" style="margin-left:8px"><path d="M7 1 C7 4 5 5 3 6 C5 6.4 6 6 6.4 5.6 C5.8 8 4.4 9 2.5 9.6 C4.8 10 6 9.2 6.6 8.4 C6.4 10.6 5.6 12 4.6 13 L7 12 L9.4 13 C8.4 12 7.6 10.6 7.4 8.4 C8 9.2 9.2 10 11.5 9.6 C9.6 9 8.2 8 7.6 5.6 C8 6 9 6.4 11 6 C9 5 7 4 7 1 Z" fill="#7dc24f" stroke="#17100a" stroke-width="0.8"></path></svg>
      <span id="h-weed" style="color:#8ae05c;font-weight:700;font-size:18px">0</span>
    </div>
    <div class="chip" style="border-color:rgba(138,224,92,.25);padding:6px 12px 6px 10px">
      <span class="muted" style="font-size:12px;font-weight:600;letter-spacing:1px">HOOD PTS</span>
      <span id="h-pts" style="color:#8ae05c;font-weight:700;font-size:19px">0</span>
      <span class="dim" style="font-size:11.5px">· bag <span id="h-bag">0</span></span>
    </div>
    <div class="chip" style="padding:5px 12px 5px 10px">
      <span id="h-online-dot" style="width:8px;height:8px;border-radius:50%;background:#8f7f63;display:inline-block"></span>
      <span id="h-online" class="muted" style="font-size:12.5px;font-weight:600">connecting…</span>
    </div>
  </div>

  <!-- HUD top-center: cycle + heat -->
  <div style="position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:20;display:flex;flex-direction:column;align-items:center;gap:6px">
    <div class="chip" style="gap:10px;border-radius:12px;padding:8px 18px">
      <span class="muted" style="font-size:13px;font-weight:600;letter-spacing:1px">CYCLE <span id="h-cyclenum">1</span></span>
      <span id="h-cycle" style="color:#f2b23a;font-size:22px;font-weight:700">--:--</span>
    </div>
    <div id="h-heat" class="hidden" style="display:flex;align-items:center;gap:8px;background:rgba(40,16,16,.9);border:1px solid rgba(232,74,74,.4);border-radius:10px;padding:4px 12px">
      <span style="color:#ff9a8a;font-size:12px;font-weight:700;letter-spacing:1px">HEAT</span>
      <div style="width:110px;height:9px;background:#17100a;border-radius:5px;overflow:hidden"><div id="h-heatbar" style="height:100%;background:linear-gradient(90deg,#e8a33d,#e84a4a);width:0%"></div></div>
      <span id="h-chase" style="color:#ff9a8a;font-size:12px;font-weight:700">watched</span>
    </div>
  </div>

  <!-- player name top-right under minimap -->
  <div id="h-user" style="position:absolute;top:104px;right:14px;z-index:20;color:#c9b896;font-size:12px;font-weight:600;text-shadow:0 1px 2px rgba(0,0,0,.6);text-align:right"></div>

  <!-- chat -->
  <div id="chat">
    <div id="chat-log"></div>
    <input id="chat-input" maxlength="140" placeholder="press Enter to chat…" autocomplete="off">
  </div>

  <!-- energy + run toggle -->
  <div style="position:absolute;bottom:16px;left:14px;z-index:20;display:flex;align-items:center;gap:10px">
    <button id="b-run" class="btn" style="background:rgba(20,18,24,.9);color:#c9d8e8;padding:9px 16px">🚶 RUN OFF</button>
    <div style="display:flex;flex-direction:column;gap:3px">
      <span style="color:#c9d8e8;font-size:11px;font-weight:700;letter-spacing:1px;text-shadow:0 1px 2px rgba(0,0,0,.6)">ENERGY</span>
      <div style="width:130px;height:11px;background:rgba(20,18,24,.9);border:1px solid rgba(243,231,205,.18);border-radius:6px;overflow:hidden"><div id="h-energy" style="height:100%;background:#5fb4d8;width:100%"></div></div>
    </div>
  </div>

  <!-- bottom buttons -->
  <div style="position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:9px;align-items:center">
    <button id="b-house" class="btn btn-green">Grow house</button>
    <button id="b-bag" class="btn btn-gold">Bag (<span id="h-bag2">0</span>)</button>
    <button id="b-board" class="btn btn-purple">Leaderboard</button>
    <button id="b-profile" class="btn btn-dim">Profile</button>
    <button id="b-help" class="btn btn-dim" style="padding:8px 12px">?</button>
  </div>

  <!-- heist progress -->
  <div id="h-heist" class="hidden" style="position:absolute;bottom:120px;left:50%;transform:translateX(-50%);z-index:20;flex-direction:column;align-items:center;gap:5px;display:flex">
    <span id="h-heisttxt" style="color:#ffce7a;font-size:13px;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.7)"></span>
    <div style="width:200px;height:16px;background:#17100a;border:1px solid rgba(23,16,10,.55);border-radius:8px;overflow:hidden">
      <div id="h-heistbar" style="height:100%;background:linear-gradient(90deg,#f8c65c,#e8763d);width:0%"></div>
    </div>
  </div>
</div>

<div id="panel" class="hidden"></div>
<div id="modal" class="hidden"></div>
<div id="toast" class="hidden"></div>

<!-- auth screen -->
<div id="auth">
  <div class="box">
    <img class="banner" src="./banner.png" alt="Robbin' da Hood — rob the rich, grow the weed, feed the hood">
    <div class="body">
      <div id="a-err" class="err"></div>
      <input id="a-user" placeholder="username" maxlength="20" autocomplete="username">
      <input id="a-pass" placeholder="password" type="password" maxlength="72" autocomplete="current-password">
      <button id="a-submit" class="btn btn-gold" style="font-size:16px;padding:10px">Log in</button>
      <div class="dim" style="font-size:13px;text-align:center">
        <span id="a-swap-txt">New in the hood?</span>
        <a href="#" id="a-swap">Create an account</a>
      </div>
    </div>
  </div>
</div>

<script src="./robhood-art.js"></script>
<script src="./sfx.js"></script>
<script src="./api.js"></script>
<script src="./game.js"></script>
</body>
</html>
